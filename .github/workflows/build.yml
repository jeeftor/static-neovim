name: Build Static Neovim

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: alpine-musl
            container: alpine:latest
            deps: build-base cmake coreutils curl gettext-tiny-dev git ninja-build
            artifact_name: nvim-static-alpine-x86_64
            runtime_path: /usr/local/share/nvim/runtime
          - name: ubuntu-glibc
            container: ubuntu:22.04
            deps: build-essential cmake coreutils curl gettext git ninja-build
            artifact_name: nvim-static-ubuntu-x86_64
            runtime_path: /usr/share/nvim/runtime
          - name: fedora-glibc
            container: fedora:38
            deps: gcc cmake coreutils curl gettext git ninja-build
            artifact_name: nvim-static-fedora-x86_64
            runtime_path: /usr/share/nvim/runtime
    container:
      image: ${{ matrix.container }}
    steps:
      - name: Install dependencies
        run: |
          if command -v apk >/dev/null 2>&1; then
            apk update
            apk add --no-cache ${{ matrix.deps }}
          elif command -v apt-get >/dev/null 2>&1; then
            apt-get update
            apt-get install -y ${{ matrix.deps }}
          elif command -v dnf >/dev/null 2>&1; then
            dnf update -y
            dnf install -y ${{ matrix.deps }}
          fi

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Clone and build Neovim
        run: |
          # Try different clone methods if one fails
          echo "Attempting to clone Neovim repository..."
          
          # Method 1: HTTPS clone (most reliable)
          if ! git clone --depth 1 --branch stable https://github.com/neovim/neovim; then
            echo "HTTPS clone failed, trying with verbose output..."
            sleep 10
            
            # Method 2: HTTPS with verbose output for debugging
            if ! GIT_CURL_VERBOSE=1 git clone --depth 1 --branch stable https://github.com/neovim/neovim; then
              echo "Verbose HTTPS clone failed, trying git protocol..."
              sleep 10
              
              # Method 3: Git protocol (fallback)
              if ! git clone --depth 1 --branch stable git://github.com/neovim/neovim; then
                echo "All clone methods failed, waiting 60 seconds and retrying HTTPS..."
                sleep 60
                git clone --depth 1 --branch stable https://github.com/neovim/neovim || {
                  echo "ERROR: All clone attempts failed"
                  exit 1
                }
              fi
            fi
          fi
          
          echo "Successfully cloned Neovim repository"
          cd neovim
          
          # Build with proper static configuration and runtime bundling
          echo "Building Neovim for ${{ matrix.name }}..."
          
          # Set proper installation prefix for portable paths
          export CMAKE_INSTALL_PREFIX=/usr/local
          
          # Build with static linking and runtime bundling
          if [ "${{ matrix.name }}" = "alpine-musl" ]; then
            # Alpine with musl - use official static build
            make CMAKE_EXTRA_FLAGS="-DSTATIC_BUILD=1 -DCMAKE_INSTALL_PREFIX=/usr/local"
          else
            # Ubuntu/Fedora with glibc - attempt static build with standard paths
            make CMAKE_BUILD_TYPE=Release \
                 CMAKE_EXTRA_FLAGS="-DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local" \
                 DEPS_CMAKE_FLAGS="-DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local"
          fi
          
          # Verify the binary
          echo "Verifying binary for ${{ matrix.name }}..."
          file build/bin/nvim
          echo "Binary size: $(du -h build/bin/nvim)"
          
          # Check static linking (works for Alpine, may fail for glibc)
          if ldd build/bin/nvim 2>&1 | grep -q "not a dynamic executable"; then
            echo "✅ Binary is statically linked"
          else
            echo "⚠️  Binary may have dynamic dependencies (glibc limitation)"
            ldd build/bin/nvim | head -5 || echo "ldd failed"
          fi
          
          # Check for hardcoded build paths
          echo "Checking for hardcoded paths..."
          strings build/bin/nvim | grep -E "(/__w/|/github/workspace)" || echo "✅ No GitHub Actions paths found"
          
          # Copy the binary with proper naming
          cp build/bin/nvim ../artifacts/${{ matrix.artifact_name }}
          echo "✅ Build completed for ${{ matrix.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-neovim-${{ matrix.name }}
          path: artifacts/${{ matrix.artifact_name }}
          retention-days: 30

  test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - name: alpine-musl
            artifact_name: nvim-static-alpine-x86_64
          - name: ubuntu-glibc
            artifact_name: nvim-static-ubuntu-x86_64
          - name: fedora-glibc
            artifact_name: nvim-static-fedora-x86_64
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: static-neovim-${{ matrix.name }}
          path: ./nvim-binary

      - name: Make binary executable
        run: chmod +x ./nvim-binary/${{ matrix.artifact_name }}

      - name: Test Neovim binary
        run: ./nvim-binary/${{ matrix.artifact_name }} --version

      - name: Test Neovim functionality
        run: |
          echo "Testing basic functionality..."
          ./nvim-binary/${{ matrix.artifact_name }} --headless -c "echo 'Hello World'" -c "qall" || echo "Basic test completed"

  release:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: success()
    strategy:
      matrix:
        include:
          - name: alpine-musl
            artifact_name: nvim-static-alpine-x86_64
            release_suffix: alpine-musl
          - name: ubuntu-glibc
            artifact_name: nvim-static-ubuntu-x86_64
            release_suffix: ubuntu-glibc
          - name: fedora-glibc
            artifact_name: nvim-static-fedora-x86_64
            release_suffix: fedora-glibc
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: static-neovim-${{ matrix.name }}
          path: ./nvim-binary

      - name: Make binary executable
        run: chmod +x ./nvim-binary/${{ matrix.artifact_name }}

      - name: Get Neovim version
        id: version
        run: |
          VERSION=$(./nvim-binary/${{ matrix.artifact_name }} --version | head -n1 | grep -o 'v[0-9]\+\.[0-9]\+\.[0-9]\+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Neovim version: $VERSION"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.version }}-${{ matrix.release_suffix }}-${{ github.run_number }}
          release_name: Static Neovim ${{ steps.version.outputs.version }} (${{ matrix.release_suffix }})
          body: |
            Static binary of Neovim ${{ steps.version.outputs.version }} for ${{ matrix.release_suffix }}
            
            **Distribution:** ${{ matrix.name }}
            **Architecture:** x86_64
            **Branch:** stable
            **Type:** Static binary with minimal dependencies
            
            **Compatibility:**
            - **Alpine-musl**: Best for Alpine Linux, truly static
            - **Ubuntu-glibc**: For Ubuntu/Debian systems
            - **Fedora-glibc**: For Fedora/RHEL/CentOS systems
            
            **Usage:**
            ```bash
            chmod +x ${{ matrix.artifact_name }}
            ./${{ matrix.artifact_name }}
            ```
            
            **Build:** Run #${{ github.run_number }}
            **Date:** ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./nvim-binary/${{ matrix.artifact_name }}
          asset_name: ${{ matrix.artifact_name }}
          asset_content_type: application/octet-stream
