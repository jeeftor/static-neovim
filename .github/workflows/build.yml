name: Build Static Neovim

on:
  workflow_dispatch: null
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    steps:
      - name: Install dependencies
        run: |
          apk update
          apk add --no-cache build-base cmake coreutils curl gettext-tiny-dev git ninja-build

      - name: Install Zig
        run: |
          wget https://ziglang.org/download/0.11.0/zig-linux-x86_64-0.11.0.tar.xz
          tar -xf zig-linux-x86_64-0.11.0.tar.xz
          mv zig-linux-x86_64-0.11.0/zig /usr/local/bin/
          rm -rf zig-linux-x86_64-0.11.0*

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Clone and build Neovim
        run: |
          # Try different clone methods if one fails
          echo "Attempting to clone Neovim repository..."
          
          # Method 1: HTTPS clone (most reliable)
          if ! git clone --depth 1 --branch stable https://github.com/neovim/neovim; then
            echo "HTTPS clone failed, trying with verbose output..."
            sleep 10
            
            # Method 2: HTTPS with verbose output for debugging
            if ! GIT_CURL_VERBOSE=1 git clone --depth 1 --branch stable https://github.com/neovim/neovim; then
              echo "Verbose HTTPS clone failed, trying git protocol..."
              sleep 10
              
              # Method 3: Git protocol (fallback)
              if ! git clone --depth 1 --branch stable git://github.com/neovim/neovim; then
                echo "All clone methods failed, waiting 60 seconds and retrying HTTPS..."
                sleep 60
                git clone --depth 1 --branch stable https://github.com/neovim/neovim || {
                  echo "ERROR: All clone attempts failed"
                  exit 1
                }
              fi
            fi
          fi
          
          echo "Successfully cloned Neovim repository"
          cd neovim
          
          # Try CMake build
          echo "Attempting CMake static build..."
          if make CMAKE_EXTRA_FLAGS="-DSTATIC_BUILD=1"; then
            echo "CMake build succeeded"
            cp build/bin/nvim ../artifacts/nvim-cmake-static-x86_64
          else
            echo "CMake build failed"
          fi
          
          # Try Zig build independently
          echo "Attempting Zig static build..."
          if command -v zig >/dev/null 2>&1; then
            echo "Building with Zig..."
            # Use Zig to compile with static linking
            zig build-exe --target x86_64-linux-musl -O ReleaseFast -static \
              -I . -I build/src \
              -I .deps/src \
              -fno-sanitize=all \
              -femit-bin=../artifacts/nvim-zig-static-x86_64 \
              src/nvim/main.c 2>/dev/null || {
              echo "Zig build failed - trying alternative approach..."
              # Alternative: use Zig as C compiler
              zig cc -target x86_64-linux-musl -static -O3 \
                -o ../artifacts/nvim-zig-static-x86_64 \
                build/src/nvim/auto/main.c 2>/dev/null || {
                echo "Zig build also failed"
              }
            }
            
            if [ -f ../artifacts/nvim-zig-static-x86_64 ]; then
              echo "Zig build succeeded"
            else
              echo "Zig build failed"
            fi
          else
            echo "Zig not found"
          fi
          
          # Check if at least one build succeeded
          if [ ! -f ../artifacts/nvim-cmake-static-x86_64 ] && [ ! -f ../artifacts/nvim-zig-static-x86_64 ]; then
            echo "ERROR: Neither CMake nor Zig build succeeded"
            exit 1
          fi

      - name: Upload CMake artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-neovim-cmake
          path: artifacts/nvim-cmake-static-x86_64
          retention-days: 30
        if: hashFiles('artifacts/nvim-cmake-static-x86_64') != ''

      - name: Upload Zig artifact
        uses: actions/upload-artifact@v4
        with:
          name: static-neovim-zig
          path: artifacts/nvim-zig-static-x86_64
          retention-days: 30
        if: hashFiles('artifacts/nvim-zig-static-x86_64') != ''

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download CMake artifact
        uses: actions/download-artifact@v4
        with:
          name: static-neovim-cmake
          path: ./nvim-cmake
        continue-on-error: true

      - name: Download Zig artifact
        uses: actions/download-artifact@v4
        with:
          name: static-neovim-zig
          path: ./nvim-zig
        continue-on-error: true

      - name: Test CMake binary
        if: hashFiles('nvim-cmake/nvim-cmake-static-x86_64') != ''
        run: |
          chmod +x nvim-cmake/nvim-cmake-static-x86_64
          ./nvim-cmake/nvim-cmake-static-x86_64 --version

      - name: Test Zig binary
        if: hashFiles('nvim-zig/nvim-zig-static-x86_64') != ''
        run: |
          chmod +x nvim-zig/nvim-zig-static-x86_64
          ./nvim-zig/nvim-zig-static-x86_64 --version

  release:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: success()
    strategy:
      matrix:
        build-method: [cmake, zig]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: static-neovim-${{ matrix.build-method }}
          path: ./nvim-binary
        continue-on-error: true

      - name: Make binary executable
        if: ${{ hashFiles(format('nvim-binary/nvim-{0}-static-x86_64', matrix.build-method)) != '' }}
        run: chmod +x ./nvim-binary/nvim-${{ matrix.build-method }}-static-x86_64

      - name: Get Neovim version
        id: version
        if: ${{ hashFiles(format('nvim-binary/nvim-{0}-static-x86_64', matrix.build-method)) != '' }}
        run: |
          VERSION=$(./nvim-binary/nvim-${{ matrix.build-method }}-static-x86_64 --version | head -n1 | grep -o 'v[0-9]\+\.[0-9]\+\.[0-9]\+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Neovim version: $VERSION"

      - name: Create Release
        id: create_release
        if: ${{ hashFiles(format('nvim-binary/nvim-{0}-static-x86_64', matrix.build-method)) != '' }}
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.version }}-${{ matrix.build-method }}-static-${{ github.run_number }}
          release_name: Static Neovim ${{ steps.version.outputs.version }} (${{ matrix.build-method }})
          body: |
            Static binary of Neovim ${{ steps.version.outputs.version }} built with ${{ matrix.build-method }}
            
            **Build Method:** ${{ matrix.build-method }}
            **Architecture:** x86_64
            **Branch:** stable
            **Type:** Fully static binary (no external dependencies)
            
            **Usage:**
            ```bash
            chmod +x nvim-${{ matrix.build-method }}-static-x86_64
            ./nvim-${{ matrix.build-method }}-static-x86_64
            ```
            
            **Build:** Run #${{ github.run_number }}
            **Date:** ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        if: ${{ hashFiles(format('nvim-binary/nvim-{0}-static-x86_64', matrix.build-method)) != '' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./nvim-binary/nvim-${{ matrix.build-method }}-static-x86_64
          asset_name: nvim-${{ matrix.build-method }}-static-x86_64
          asset_content_type: application/octet-stream
